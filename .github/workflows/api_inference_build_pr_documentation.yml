name: Build Inference Providers PR Documentation

on:
  pull_request:
    paths:
      - "docs/inference-providers/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    uses: huggingface/doc-builder/.github/workflows/build_pr_documentation.yml@bcff59fca682130d2e7271ca8589911b7ac0b8bf  # main
    with:
      commit_sha: ${{ github.event.pull_request.head.sha }}
      pr_number: ${{ github.event.number }}
      package: hub-docs
      package_name: inference-providers
      path_to_docs: hub-docs/docs/inference-providers/
      additional_args: --not_python_module
