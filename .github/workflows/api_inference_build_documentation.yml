name: Build Inference Providers documentation

on:
  push:
    paths:
      - "docs/inference-providers/**"
    branches:
      - main

jobs:
   build:
    uses: huggingface/doc-builder/.github/workflows/build_main_documentation.yml@9ad2de8582b56c017cb530c1165116d40433f1c6  # main
    with:
      commit_sha: ${{ github.sha }}
      package: hub-docs
      package_name: inference-providers
      path_to_docs: hub-docs/docs/inference-providers/
      additional_args: --not_python_module
    secrets:
      hf_token: ${{ secrets.HF_DOC_BUILD_PUSH }}
